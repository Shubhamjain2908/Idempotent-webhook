version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-postgres
    environment:
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_password
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user -d webhook_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The standalone migration runner
  flyway:
    image: flyway/flyway:10-alpine
    container_name: webhook-flyway
    command: -url=jdbc:postgresql://postgres:5432/webhook_db -user=webhook_user -password=webhook_password migrate
    volumes:
      # Mounts the local Spring Boot migration folder into the container
      - ./src/main/resources/db/migration:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:main-distroless
    container_name: webhook-prometheus
    ports:
      - "9090:9090"
    volumes:
      # We will create this file in the next step
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    # host.docker.internal allows Prometheus inside Docker to scrape your app running on localhost:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:main
    container_name: webhook-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
